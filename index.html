    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@400;500;700;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
            background-color: #030308;
            overflow-x: hidden;
        }

        .tech-font {
            font-family: 'Share Tech Mono', monospace;
        }

        .backdrop-blur-xl {
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }

        .lucide-icon-wrapper i {
            display: inline-block;
            line-height: 0;
        }

        /* Scanline and tech grid effects */
        .cyber-grid {
            background-image: linear-gradient(rgba(14, 165, 233, 0.05) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(14, 165, 233, 0.05) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* Iron Man Glowing Reticle Animations */
        @keyframes rotate-clockwise {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes rotate-counter {
            from { transform: rotate(0deg); }
            to { transform: rotate(-360deg); }
        }

        .animate-spin-slow {
            animation: rotate-clockwise 20s linear infinite;
        }

        .animate-spin-reverse {
            animation: rotate-counter 12s linear infinite;
        }

        /* Tech HUD frame corners */
        .tech-corner-tl {
            position: absolute; top: 0; left: 0; width: 12px; height: 12px;
            border-top: 2px solid rgb(14, 165, 233); border-left: 2px solid rgb(14, 165, 233);
        }
        .tech-corner-tr {
            position: absolute; top: 0; right: 0; width: 12px; height: 12px;
            border-top: 2px solid rgb(14, 165, 233); border-right: 2px solid rgb(14, 165, 233);
        }
        .tech-corner-bl {
            position: absolute; bottom: 0; left: 0; width: 12px; height: 12px;
            border-bottom: 2px solid rgb(14, 165, 233); border-left: 2px solid rgb(14, 165, 233);
        }
        .tech-corner-br {
            position: absolute; bottom: 0; right: 0; width: 12px; height: 12px;
            border-bottom: 2px solid rgb(14, 165, 233); border-right: 2px solid rgb(14, 165, 233);
        }

        /* Stark Red styling accents */
        .stark-glow {
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.25);
        }

</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { motion, AnimatePresence } = window.Motion;

        // Custom Web Audio Synthesizer for Stark UI Sound Effects
        const playSynthSound = (type, soundEnabled) => {
            if (!soundEnabled) return;
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;
                const ctx = new AudioContext();
                
                if (type === 'click') {
                    // Quick digital tech click
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(1200, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(300, ctx.currentTime + 0.1);
                    gain.gain.setValueAtTime(0.08, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.1);
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.1);
                } else if (type === 'hover') {
                    // Soft high-tech digital tick
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(2000, ctx.currentTime);
                    gain.gain.setValueAtTime(0.02, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.03);
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.03);
                } else if (type === 'repulsor') {
                    // Epic Iron Man Repulsor charging & firing effect
                    const now = ctx.currentTime;
                    
                    // Charge (high sweep)
                    const oscCharge = ctx.createOscillator();
                    const gainCharge = ctx.createGain();
                    oscCharge.type = 'sawtooth';
                    oscCharge.frequency.setValueAtTime(100, now);
                    oscCharge.frequency.exponentialRampToValueAtTime(1800, now + 0.4);
                    
                    gainCharge.gain.setValueAtTime(0, now);
                    gainCharge.gain.linearRampToValueAtTime(0.12, now + 0.2);
                    gainCharge.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
                    
                    // Filter to make it sci-fi
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'bandpass';
                    filter.frequency.setValueAtTime(500, now);
                    filter.frequency.exponentialRampToValueAtTime(2000, now + 0.4);

                    oscCharge.connect(filter);
                    filter.connect(gainCharge);
                    gainCharge.connect(ctx.destination);
                    
                    oscCharge.start(now);
                    oscCharge.stop(now + 0.45);

                    // Blast sound (short laser pop at the end)
                    setTimeout(() => {
                        const blastOsc = ctx.createOscillator();
                        const blastGain = ctx.createGain();
                        blastOsc.type = 'sine';
                        blastOsc.frequency.setValueAtTime(2200, ctx.currentTime);
                        blastOsc.frequency.exponentialRampToValueAtTime(150, ctx.currentTime + 0.25);
                        
                        blastGain.gain.setValueAtTime(0.15, ctx.currentTime);
                        blastGain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.25);
                        
                        blastOsc.connect(blastGain);
                        blastGain.connect(ctx.destination);
                        
                        blastOsc.start();
                        blastOsc.stop(ctx.currentTime + 0.26);
                    }, 400);
                }
            } catch (e) {
                console.warn("Audio Context block or unsupported browser", e);
            }
        };

        const Icon = ({ name, size = 24, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (iconRef.current) {
                    iconRef.current.innerHTML = '';
                    const iconElement = document.createElement('i');
                    const formattedName = name.replace(/([a-z0-9])([A-Z])/g, '$1-$2').toLowerCase();
                    iconElement.setAttribute('data-lucide', formattedName);
                    iconElement.style.width = `${size}px`;
                    iconElement.style.height = `${size}px`;
                    if (className) iconElement.className = className;
                    iconRef.current.appendChild(iconElement);
                    if (window.lucide) window.lucide.createIcons();
                }
            }, [name, size, className]);
            return <span ref={iconRef} className="lucide-icon-wrapper inline-flex items-center justify-center"></span>;
        };

        // Interactive Three.js Stark Arc Reactor Component
        const ArcReactor3D = ({ starkTheme, soundEnabled }) => {
            const containerRef = useRef(null);
            const burstRef = useRef(null);

            useEffect(() => {
                if (!containerRef.current) return;

                // Renderer Setup
                const width = containerRef.current.clientWidth || 300;
                const height = containerRef.current.clientHeight || 300;
                const scene = new THREE.Scene();
                
                const camera = new THREE.PerspectiveCamera(60, width / height, 0.1, 1000);
                camera.position.z = 5;

                const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
                renderer.setSize(width, height);
                renderer.setPixelRatio(window.devicePixelRatio);
                containerRef.current.appendChild(renderer.domElement);

                // Group to hold all reactor components
                const reactorGroup = new THREE.Group();
                scene.add(reactorGroup);

                // Colors based on Stark Mode (Red/Orange vs Ice Blue)
                const primaryColor = starkTheme ? 0xff3b30 : 0x0ea5e9;
                const secondaryColor = starkTheme ? 0xffd700 : 0x38bdf8;

                // Material helper
                const createWireframeMaterial = (color) => {
                    return new THREE.MeshBasicMaterial({
                        color: color,
                        wireframe: true,
                        transparent: true,
                        opacity: 0.8
                    });
                };

                // 1. Central Core Glow Sphere
                const coreGeo = new THREE.SphereGeometry(0.5, 16, 16);
                const coreMat = new THREE.MeshBasicMaterial({
                    color: secondaryColor,
                    transparent: true,
                    opacity: 0.95
                });
                const core = new THREE.Mesh(coreGeo, coreMat);
                reactorGroup.add(core);

                // 2. Triangular Repulsor Concentrator
                const triangleGeo = new THREE.RingGeometry(0.7, 0.9, 3);
                const triangleMat = createWireframeMaterial(primaryColor);
                const triangle = new THREE.Mesh(triangleGeo, triangleMat);
                reactorGroup.add(triangle);

                // 3. Segmented Outer Ring Accelerator
                const outerRingGeo = new THREE.TorusGeometry(1.4, 0.08, 8, 48);
                const outerRingMat = createWireframeMaterial(secondaryColor);
                const outerRing = new THREE.Mesh(outerRingGeo, outerRingMat);
                reactorGroup.add(outerRing);

                // 4. Energetic Particle Beam Ring (Floating Sparks)
                const particleCount = 120;
                const particlesGeo = new THREE.BufferGeometry();
                const positions = new Float32Array(particleCount * 3);
                const speeds = [];

                for (let i = 0; i < particleCount; i++) {
                    const angle = (i / particleCount) * Math.PI * 2;
                    const radius = 1.4 + (Math.random() - 0.5) * 0.2;
                    positions[i * 3] = Math.cos(angle) * radius;
                    positions[i * 3 + 1] = Math.sin(angle) * radius;
                    positions[i * 3 + 2] = (Math.random() - 0.5) * 0.3;
                    speeds.push({
                        angle: angle,
                        speed: 0.01 + Math.random() * 0.02,
                        radius: radius,
                        zOffset: (Math.random() - 0.5) * 0.02
                    });
                }

                particlesGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                const particlesMat = new THREE.PointsMaterial({
                    color: primaryColor,
                    size: 0.06,
                    transparent: true,
                    opacity: 0.9
                });
                const particleSystem = new THREE.Points(particlesGeo, particlesMat);
                reactorGroup.add(particleSystem);

                // 5. Secondary Segmented Tech Ring
                const techRingGeo = new THREE.RingGeometry(1.1, 1.25, 24);
                const techRingMat = createWireframeMaterial(primaryColor);
                const techRing = new THREE.Mesh(techRingGeo, techRingMat);
                techRing.rotation.z = Math.PI / 6;
                reactorGroup.add(techRing);

                // Animation variables
                let mouseX = 0;
                let mouseY = 0;
                let targetX = 0;
                let targetY = 0;
                let burstMode = false;
                let burstTimer = 0;

                const handleMouseMove = (event) => {
                    const rect = containerRef.current.getBoundingClientRect();
                    const x = event.clientX - rect.left - (rect.width / 2);
                    const y = event.clientY - rect.top - (rect.height / 2);
                    targetX = (x / rect.width) * 1.5;
                    targetY = -(y / rect.height) * 1.5;
                };

                // Click triggers high-speed repulsor charge & burst animation
                const handleReactorClick = () => {
                    if (burstMode) return;
                    burstMode = true;
                    burstTimer = 1.0;
                    playSynthSound('repulsor', soundEnabled);
                };

                const currentContainer = containerRef.current;
                currentContainer.addEventListener('mousemove', handleMouseMove);
                currentContainer.addEventListener('click', handleReactorClick);

                // Custom animation loop
                let animationFrameId;
                const animate = () => {
                    animationFrameId = requestAnimationFrame(animate);

                    // Interpolate mouse movement for super smooth inertia
                    mouseX += (targetX - mouseX) * 0.08;
                    mouseY += (targetY - mouseY) * 0.08;

                    reactorGroup.rotation.y = mouseX;
                    reactorGroup.rotation.x = -mouseY;

                    // Spinning reactor components in alternating directions
                    triangle.rotation.z -= 0.01;
                    outerRing.rotation.z += 0.004;
                    techRing.rotation.z -= 0.002;

                    // Update particle loop
                    const posArr = particleSystem.geometry.attributes.position.array;
                    for (let i = 0; i < particleCount; i++) {
                        // Push particles radially or spin them
                        const currentSpeed = speeds[i];
                        currentSpeed.angle += burstMode ? currentSpeed.speed * 8 : currentSpeed.speed;
                        
                        const r = currentSpeed.radius + (burstMode ? (1.0 - burstTimer) * 1.2 : 0);
                        posArr[i * 3] = Math.cos(currentSpeed.angle) * r;
                        posArr[i * 3 + 1] = Math.sin(currentSpeed.angle) * r;
                        posArr[i * 3 + 2] += currentSpeed.zOffset * (burstMode ? 5 : 1);
                        
                        // Bounce z-offset
                        if (Math.abs(posArr[i * 3 + 2]) > 0.5) {
                            currentSpeed.zOffset = -currentSpeed.zOffset;
                        }
                    }
                    particleSystem.geometry.attributes.position.needsUpdate = true;

                    // Core pulse
                    const pulse = 1.0 + Math.sin(Date.now() * 0.008) * 0.1;
                    core.scale.set(pulse, pulse, pulse);

                    // Handle Repulsor Burst visuals
                    if (burstMode) {
                        burstTimer -= 0.02;
                        const burstIntensity = Math.sin(burstTimer * Math.PI) * 4;
                        core.scale.set(pulse + burstIntensity, pulse + burstIntensity, pulse + burstIntensity);
                        coreMat.color.setHex(0xffffff); // Core flashes blinding white
                        
                        if (burstTimer <= 0) {
                            burstMode = false;
                            coreMat.color.setHex(secondaryColor);
                        }
                    }

                    renderer.render(scene, camera);
                };

                animate();

                // Dynamic window resize
                const handleResize = () => {
                    if (!containerRef.current) return;
                    const w = containerRef.current.clientWidth;
                    const h = containerRef.current.clientHeight;
                    camera.aspect = w / h;
                    camera.updateProjectionMatrix();
                    renderer.setSize(w, h);
                };
                window.addEventListener('resize', handleResize);

                // Cleanup
                return () => {
                    cancelAnimationFrame(animationFrameId);
                    if (currentContainer) {
                        currentContainer.removeEventListener('mousemove', handleMouseMove);
                        currentContainer.removeEventListener('click', handleReactorClick);
                    }
                    window.removeEventListener('resize', handleResize);
                    try {
                        renderer.dispose();
                        if (currentContainer.contains(renderer.domElement)) {
                            currentContainer.removeChild(renderer.domElement);
                        }
                    } catch (e) {
                        // ignore error during quick hot-reload
                    }
                };
            }, [starkTheme, soundEnabled]);

            return (
                <div className="relative flex flex-col items-center justify-center">
                    {/* Glowing circular backdrop */}
                    <div className={`absolute w-44 h-44 rounded-full filter blur-[45px] transition-all duration-700 pointer-events-none ${starkTheme ? 'bg-red-500/20' : 'bg-sky-500/10'}`} />
                    
                    <div 
                        ref={containerRef} 
                        className="w-[280px] h-[280px] sm:w-[320px] sm:h-[320px] cursor-pointer"
                        title="Stark Arc Reactor: Click to fire Repulsor Beam"
                    />

                    {/* Interaction HUD hint */}
                    <div className="absolute bottom-2 pointer-events-none text-center">
                        <span className={`text-[10px] uppercase font-mono tracking-widest ${starkTheme ? 'text-red-400' : 'text-sky-400'} animate-pulse`}>
                            [ Click Reactor to Fire ]
                        </span>
                    </div>
                </div>
            );
        };

        const profileImageUrl = "./index.jpg"; 

        const translations = {
            en: {
                home: "STARK_OS",
                projects: "Arsenal",
                contact: "Comms",
                greeting: "ACCESS_GRANTED_BY",
                role: "SecOps Architect & Stark Systems Specialist",
                summaryTitle: "CORE_SPECS",
                summaryText: "Stark-grade security professional specializing in armored network defense, secure system architecture, and ultra-resilient application infrastructure. Expert in threat-mitigation scripts, cryptographic key pairing, and building custom operational dashboards designed to operate under zero-trust guidelines.",
                projectsBtn: "Engage Weapon Systems",
                myProjects: "Weapon Arsenal",
                projectDesc: "Combat-ready deployments, monitored by internal systems.",
                getInTouch: "Encrypted Comms Channel",
                nameLabel: "Comms Tag",
                emailLabel: "Digital Mail",
                messageLabel: "Transmitted Packet",
                send: "Broadcast Secure Signal",
                footer: "DESIGNED & ARMORED BY SHENOL PERERA",
                successMsg: "Transmission Broadcasted!",
            },
            ru: {
                home: "STARK_OS",
                projects: "Арсенал",
                contact: "Связь",
                greeting: "ДОСТУП_РАЗРЕШЕН",
                role: "Архитектор ИТ-безопасности и Stark систем",
                summaryTitle: "ХАРАКТЕРИСТИКИ",
                summaryText: "Специалист по кибербезопасности оборонного уровня, занимающийся бронированной архитектурой сетей и устойчивым программным кодом.",
                projectsBtn: "Запустить протокол систем",
                myProjects: "Проекты Арсенала",
                projectDesc: "Проверенные боевые модули готовые к работе.",
                getInTouch: "Шифрованный Канал Связи",
                nameLabel: "Имя адресата",
                emailLabel: "Цифровая почта",
                messageLabel: "Сообщение",
                send: "Передать Сигнал",
                footer: "РАЗРАБОТАНО И ЗАЩИЩЕНО ШЕНОЛОМ ПЕРЕРОЙ",
                successMsg: "Сигнал успешно транслирован!",
            }
        };

        const App = () => {
            const [lang, setLang] = useState('en');
            const [activeTab, setActiveTab] = useState('home');
            const [starkTheme, setStarkTheme] = useState(false); // False = Ice Blue J.A.R.V.I.S / True = Crimson Red Stark Mode
            const [soundEnabled, setSoundEnabled] = useState(true);
            const [time, setTime] = useState(new Date());
            const [imgError, setImgError] = useState(false);
            const t = translations[lang];

            // Sound player wrapper helper
            const playSound = (type) => {
                playSynthSound(type, soundEnabled);
            };

            useEffect(() => {
                const timer = setInterval(() => setTime(new Date()), 1000);

                const handleContextMenu = (e) => e.preventDefault();
                document.addEventListener('contextmenu', handleContextMenu);

                const handleKeyDown = (e) => {
                    if (e.keyCode === 123) { e.preventDefault(); return false; }
                    if (e.ctrlKey && e.shiftKey && e.keyCode === 73) { e.preventDefault(); return false; }
                    if (e.ctrlKey && e.shiftKey && e.keyCode === 74) { e.preventDefault(); return false; }
                    if (e.ctrlKey && e.keyCode === 85) { e.preventDefault(); return false; }
                };
                document.addEventListener('keydown', handleKeyDown);

                return () => {
                    clearInterval(timer);
                    document.removeEventListener('contextmenu', handleContextMenu);
                    document.removeEventListener('keydown', handleKeyDown);
                };
            }, []);

            // Preserving original project dataset perfectly
            const projectList = [
                { id: 0, title: "Crypto LK", desc: "Real-time crypto tracker.", url: "https://cryptolk.netlify.app/", icon: "TrendingUp", color: "from-yellow-500 to-amber-600" },
                { id: 1, title: "Focus Time", desc: "Productivity timer.", url: "https://loveblefocustimerpro.netlify.app/", icon: "Clock", color: "from-orange-400 to-red-500" },
                { id: 2, title: "QR Generator", desc: "Fast QR tool.", url: "https://loveableqr.netlify.app/", icon: "QrCode", color: "from-blue-400 to-cyan-500" },
                { id: 3, title: "Any Video Downloader by URL", desc: "Download videos from any URL | EXE file", url: "https://drive.google.com/file/d/1YTmDYUZHttnJJ5EVg4J3p1q0pWsXuxVd/view?usp=sharing", icon: "Download", color: "from-red-600 to-rose-700"},
                { id: 4, title: "Metadata Binder", desc: "Image Metadata Binder tool.", url: "/projects/ImageMetadataBinder.html", icon: "ImagePlus", color: "from-purple-600 to-indigo-700"}
            ];

            return (
                <div className={`min-h-screen transition-colors duration-700 overflow-x-hidden relative text-white bg-[#030308] ${starkTheme ? 'border-t-4 border-red-600' : 'border-t-4 border-sky-500'}`}>
                    
                    {/* Futuristic Background Grids & Scans */}
                    <div className="fixed inset-0 cyber-grid opacity-15 pointer-events-none" />
                    
                    {/* Pulsing Light Sources */}
                    <div className="fixed inset-0 overflow-hidden pointer-events-none opacity-20">
                        <motion.div 
                            animate={{ scale: [1, 1.3, 1], rotate: [0, 90, 0] }} 
                            transition={{ duration: 18, repeat: Infinity }} 
                            className={`absolute -top-1/4 -left-1/4 w-full h-full filter blur-[150px] rounded-full transition-colors duration-1000 ${starkTheme ? 'bg-red-600/10' : 'bg-sky-600/10'}`} 
                        />
                        <motion.div 
                            animate={{ scale: [1.2, 1, 1.2], rotate: [360, 270, 360] }} 
                            transition={{ duration: 25, repeat: Infinity }} 
                            className={`absolute -bottom-1/4 -right-1/4 w-full h-full filter blur-[150px] rounded-full transition-colors duration-1000 ${starkTheme ? 'bg-orange-500/10' : 'bg-blue-600/10'}`} 
                        />
                    </div>

                    {/* Top HUD Header */}
                    <header className="fixed top-0 w-full z-50 px-4 sm:px-8 py-4 flex justify-between items-center backdrop-blur-xl border-b border-white/5 bg-[#030308]/60">
                        <div className="flex flex-col">
                            <span className="font-extrabold text-sm sm:text-lg tracking-widest tech-font flex items-center gap-1.5 text-slate-100">
                                <span className={`inline-block w-2.5 h-2.5 rounded-full ${starkTheme ? 'bg-red-500 animate-ping' : 'bg-sky-400 animate-ping'}`} />
                                SHENOL_OS v3.8_STARK
                            </span>
                            <span className={`text-[9px] font-bold font-mono tracking-widest uppercase ${starkTheme ? 'text-red-400' : 'text-sky-400'}`}>
                                SYS_TIME: {time.toLocaleTimeString()} | PWR_STABLE_98%
                            </span>
                        </div>
                        
                        {/* Audio & Visual Stark Controls */}
                        <div className="flex gap-1.5 sm:gap-2.5">
                            {/* Toggle Audio System */}
                            <button 
                                onClick={() => {
                                    setSoundEnabled(!soundEnabled);
                                    if(!soundEnabled) playSynthSound('click', true);
                                }} 
                                className={`w-9 h-9 sm:w-10 sm:h-10 flex items-center justify-center rounded-full border transition-all ${soundEnabled ? 'bg-white/5 border-sky-500/50 text-sky-400' : 'bg-white/2 border-white/5 text-gray-500'}`}
                                title="Toggle Audio Feeback System"
                            >
                                <Icon name={soundEnabled ? "Volume2" : "VolumeX"} size={16} />
                            </button>

                            {/* Toggle Theme: Crimson Red Repulsor vs J.A.R.V.I.S Blue */}
                            <button 
                                onClick={() => {
                                    setStarkTheme(!starkTheme);
                                    playSound('click');
                                }} 
                                className={`w-9 h-9 sm:w-10 sm:h-10 flex items-center justify-center rounded-full border transition-all ${starkTheme ? 'bg-red-500/20 border-red-500/60 text-red-500 stark-glow' : 'bg-sky-500/15 border-sky-500/40 text-sky-400'}`}
                                title={starkTheme ? "Switch to J.A.R.V.I.S Light Mode" : "Activate Mark-85 Repulsor Red"}
                            >
                                <Icon name="Zap" size={16} className={starkTheme ? "animate-bounce" : ""} />
                            </button>

                            {/* Language Selector */}
                            <button 
                                onClick={() => {
                                    setLang(lang === 'en' ? 'ru' : 'en');
